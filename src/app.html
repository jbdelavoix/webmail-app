<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
  </head>

  <body class="h-screen bg-slate-900 text-slate-100" data-theme="dark">
    <div class="flex h-full">
      <aside
        class="w-20 bg-slate-950 border-r border-slate-800 flex flex-col items-center py-4 gap-4"
      >
        <div class="w-10 h-2 flex items-center justify-center"></div>

        <div class="w-full border-t border-slate-800 my-2"></div>

        <div id="accounts-list" class="flex flex-col gap-4"></div>

        <div class="flex-1"></div>

        <button
          id="settings-btn"
          class="w-10 h-10 p-2 rounded-xl hover:bg-sky-600 cursor-pointer flex items-center justify-center transition-colors"
          title="Paramètres"
          style="background-color: var(--btn-bg)"
        >
          <span class="iconify w-6 h-6" data-icon="mdi:cog"></span>
        </button>
      </aside>

      <main class="flex-1 flex flex-col">
        <div class="flex-1 flex flex-row" id="main-content"></div>
        <div class="flex-1 flex flex-row" id="settings-content"></div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
