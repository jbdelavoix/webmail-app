<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Webmail</title>
    <link rel="stylesheet" href="vendor/tailwind.css" />
    <script src="vendor/iconify.min.js"></script>
  </head>

  <body class="h-screen bg-slate-900 text-slate-100">
    <div class="flex h-full min-h-0 flex-col">
      <div
        id="window-split"
        class="flex min-h-0 flex-1 flex-col overflow-hidden"
      >
        <div id="chrome-root" class="flex min-h-0 shrink-0">
          <div id="account-tab-bar" aria-hidden="true"></div>
          <button
            id="settings-btn"
            type="button"
            class="chrome-settings-btn"
            title="Settings"
          >
            <span class="iconify h-[1.125rem] w-[1.125rem] shrink-0" data-icon="mdi:cog"></span>
          </button>
        </div>
        <div
          id="content-stack"
          class="flex min-h-0 flex-1 flex-col overflow-hidden"
        >
          <div
            id="mail-workspace"
            class="flex min-h-0 flex-1 flex-col overflow-hidden"
          >
            <div
              id="main-content"
              class="flex min-h-0 min-w-0 flex-1 flex-col"
            ></div>
          </div>
          <div
            id="settings-content"
            class="hidden min-h-0 flex-1 flex-col overflow-hidden"
          ></div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
